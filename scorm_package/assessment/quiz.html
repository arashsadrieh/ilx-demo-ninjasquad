<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Assessment — GCP to AWS Migration</title>
    <link rel="stylesheet" href="../shared/style.css">
    <script src="questions.js" type="text/javascript"></script>
    <style>
        .quiz-header {
            text-align: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 2px solid #e5e7eb;
        }
        .quiz-header h1 { margin-bottom: 8px; }
        .quiz-info {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 12px;
            font-size: 14px;
            color: #6b7280;
        }
        .quiz-info span { display: flex; align-items: center; gap: 6px; }

        .question-card {
            background: #fafbfc;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }
        .question-card:hover { border-color: #c7d2fe; }
        .question-card.correct { border-color: #34d399; background: #f0fdf4; }
        .question-card.incorrect { border-color: #f87171; background: #fef2f2; }

        .question-number {
            display: inline-block;
            background: #1e3a5f;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .module-tag {
            display: inline-block;
            background: #eef2ff;
            color: #4338ca;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 8px;
        }
        .question-text {
            font-size: 15px;
            font-weight: 500;
            color: #1f2937;
            margin-bottom: 14px;
            line-height: 1.5;
        }

        .answer-option {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            margin-bottom: 6px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            font-size: 14px;
        }
        .answer-option:hover { background: #f0f4ff; border-color: #c7d2fe; }
        .answer-option input[type="radio"] {
            margin-right: 10px;
            accent-color: #1a56db;
            width: 16px;
            height: 16px;
        }
        .answer-option.selected { background: #eef2ff; border-color: #818cf8; }
        .answer-option.correct-answer { background: #dcfce7; border-color: #34d399; }
        .answer-option.wrong-answer { background: #fef2f2; border-color: #f87171; }

        .feedback {
            margin-top: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            display: none;
        }
        .feedback.correct { display: block; background: #dcfce7; color: #166534; }
        .feedback.incorrect { display: block; background: #fef2f2; color: #991b1b; }

        /* Submit button */
        .submit-section {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 2px solid #e5e7eb;
        }
        #submitBtn {
            background: #1a56db;
            color: #fff;
            border: none;
            padding: 14px 48px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #submitBtn:hover { background: #3b7de6; }
        #submitBtn:disabled { background: #9ca3af; cursor: default; }

        /* Results */
        #results {
            display: none;
            text-align: center;
            padding: 32px;
            margin-top: 24px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
        }
        .score-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 42px;
            font-weight: 700;
        }
        .score-circle.passed { background: #dcfce7; color: #166534; border: 4px solid #34d399; }
        .score-circle.failed { background: #fef2f2; color: #991b1b; border: 4px solid #f87171; }
        .score-circle .label { font-size: 13px; font-weight: 500; margin-top: 2px; }
        .result-text { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .result-detail { font-size: 14px; color: #6b7280; margin-bottom: 4px; }

        #retryBtn {
            display: none;
            margin-top: 16px;
            background: #fff;
            border: 1px solid #d1d5db;
            padding: 10px 32px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
        }
        #retryBtn:hover { background: #f3f4f6; }
    </style>
</head>
<body>
    <div class="quiz-header">
        <span class="module-badge">Final Assessment</span>
        <h1>Knowledge Check</h1>
        <p style="color: #6b7280; margin-top: 4px;">Test your understanding of GCP-to-AWS migration strategy</p>
        <div class="quiz-info">
            <span>&#128221; 15 Questions</span>
            <span>&#9201; ~10 min</span>
            <span>&#127942; 70% to pass</span>
        </div>
    </div>

    <div id="quiz-container"></div>

    <div class="submit-section">
        <button id="submitBtn" onclick="submitQuiz()">Submit Answers</button>
    </div>

    <div id="results">
        <div class="score-circle" id="scoreCircle">
            <span id="scoreValue">0%</span>
            <span class="label">Score</span>
        </div>
        <div class="result-text" id="resultText"></div>
        <div class="result-detail" id="resultDetail"></div>
        <div class="result-detail" id="resultBreakdown"></div>
        <button id="retryBtn" onclick="resetQuiz()">Retry Assessment</button>
    </div>

    <script type="text/javascript">
    var submitted = false;

    function renderQuiz() {
        var container = document.getElementById("quiz-container");
        var html = "";
        var moduleLabels = { 1: "Module 1", 2: "Module 2", 3: "Module 3" };

        for (var i = 0; i < defined_questions.length; i++) {
            var q = defined_questions[i];
            html += '<div class="question-card" id="qcard_' + i + '">';
            html += '<span class="question-number">Question ' + (i + 1) + '</span>';
            html += '<span class="module-tag">' + moduleLabels[q.module] + '</span>';
            html += '<div class="question-text">' + q.text + '</div>';

            for (var j = 0; j < q.answers.length; j++) {
                html += '<label class="answer-option" id="opt_' + i + '_' + j + '" onclick="selectAnswer(' + i + ', ' + j + ')">';
                html += '<input type="radio" name="q_' + i + '" value="' + j + '">';
                html += q.answers[j];
                html += '</label>';
            }

            html += '<div class="feedback" id="fb_' + i + '"></div>';
            html += '</div>';
        }

        container.innerHTML = html;
    }

    function selectAnswer(qIndex, aIndex) {
        if (submitted) return;
        var options = document.querySelectorAll('[name="q_' + qIndex + '"]');
        for (var k = 0; k < options.length; k++) {
            document.getElementById("opt_" + qIndex + "_" + k).className = "answer-option";
        }
        document.getElementById("opt_" + qIndex + "_" + aIndex).className = "answer-option selected";
    }

    function submitQuiz() {
        if (submitted) return;

        var correctCount = 0;
        var answeredCount = 0;
        var moduleScores = { 1: { correct: 0, total: 0 }, 2: { correct: 0, total: 0 }, 3: { correct: 0, total: 0 } };

        for (var i = 0; i < defined_questions.length; i++) {
            var q = defined_questions[i];
            moduleScores[q.module].total++;

            var selected = document.querySelector('input[name="q_' + i + '"]:checked');
            var selectedIndex = selected ? parseInt(selected.value) : -1;
            var fb = document.getElementById("fb_" + i);
            var card = document.getElementById("qcard_" + i);

            if (selectedIndex === -1) {
                // Unanswered
                fb.className = "feedback incorrect";
                fb.textContent = "Not answered. Correct answer: " + q.answers[q.correct];
                fb.style.display = "block";
                card.className = "question-card incorrect";
                document.getElementById("opt_" + i + "_" + q.correct).className = "answer-option correct-answer";
            } else {
                answeredCount++;
                if (selectedIndex === q.correct) {
                    correctCount++;
                    moduleScores[q.module].correct++;
                    fb.className = "feedback correct";
                    fb.textContent = "Correct!";
                    fb.style.display = "block";
                    card.className = "question-card correct";
                    document.getElementById("opt_" + i + "_" + selectedIndex).className = "answer-option correct-answer";
                } else {
                    fb.className = "feedback incorrect";
                    fb.textContent = "Incorrect. Correct answer: " + q.answers[q.correct];
                    fb.style.display = "block";
                    card.className = "question-card incorrect";
                    document.getElementById("opt_" + i + "_" + selectedIndex).className = "answer-option wrong-answer";
                    document.getElementById("opt_" + i + "_" + q.correct).className = "answer-option correct-answer";
                }
            }
        }

        var score = Math.round((correctCount / defined_questions.length) * 100);
        var passed = score >= 70;

        // Show results
        document.getElementById("results").style.display = "block";
        document.getElementById("scoreValue").textContent = score + "%";
        document.getElementById("scoreCircle").className = "score-circle " + (passed ? "passed" : "failed");
        document.getElementById("resultText").textContent = passed ? "Congratulations! You passed!" : "Not quite — keep studying!";
        document.getElementById("resultDetail").textContent = correctCount + " of " + defined_questions.length + " questions correct (" + answeredCount + " answered)";
        document.getElementById("resultBreakdown").textContent =
            "Module 1: " + moduleScores[1].correct + "/" + moduleScores[1].total +
            " | Module 2: " + moduleScores[2].correct + "/" + moduleScores[2].total +
            " | Module 3: " + moduleScores[3].correct + "/" + moduleScores[3].total;

        if (!passed) {
            document.getElementById("retryBtn").style.display = "inline-block";
        }

        submitted = true;
        document.getElementById("submitBtn").disabled = true;

        // Report score to LMS via parent frame
        if (parent.RecordTest) {
            parent.RecordTest(score);
        }

        // Scroll to results
        document.getElementById("results").scrollIntoView({ behavior: "smooth" });
    }

    function resetQuiz() {
        submitted = false;
        document.getElementById("results").style.display = "none";
        document.getElementById("submitBtn").disabled = false;
        document.getElementById("retryBtn").style.display = "none";
        renderQuiz();
        window.scrollTo({ top: 0, behavior: "smooth" });
    }

    // Initialize
    renderQuiz();
    </script>
</body>
</html>
