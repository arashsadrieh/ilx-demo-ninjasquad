<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Computing: Multi-Cloud Migration Strategy — GCP to AWS</title>
    <script src="scormfunctions.js" type="text/javascript"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        #app { display: flex; height: 100vh; }

        /* Sidebar */
        #sidebar {
            width: 280px;
            min-width: 280px;
            background: #1e293b;
            color: #c8ccd4;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.3s, min-width 0.3s;
        }
        #sidebar.collapsed { width: 0; min-width: 0; }

        #sidebar-header {
            padding: 16px;
            background: #172033;
            border-bottom: 1px solid #2a2f3e;
        }
        #sidebar-header h2 {
            font-size: 14px;
            font-weight: 600;
            color: #e8ecf1;
            margin-bottom: 4px;
        }
        #sidebar-header p {
            font-size: 11px;
            color: #8a90a0;
        }

        #toc {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .toc-module {
            padding: 10px 16px 4px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6b7280;
        }
        .toc-item {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            border-left: 3px solid transparent;
            transition: background 0.15s, border-color 0.15s;
        }
        .toc-item:hover { background: #242938; }
        .toc-item.active {
            background: #242938;
            border-left-color: #1a56db;
            color: #e8ecf1;
        }
        .toc-item.completed .toc-check { color: #34d399; }
        .toc-check {
            width: 20px;
            margin-right: 8px;
            font-size: 12px;
            color: #4a4f5e;
            flex-shrink: 0;
        }
        .toc-label { flex: 1; line-height: 1.4; }

        /* Progress bar */
        #progress-bar {
            padding: 12px 16px;
            background: #172033;
            border-top: 1px solid #2a2f3e;
        }
        #progress-bar .label {
            font-size: 11px;
            color: #8a90a0;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        #progress-track {
            height: 4px;
            background: #2a2f3e;
            border-radius: 2px;
            overflow: hidden;
        }
        #progress-fill {
            height: 100%;
            background: #1a56db;
            border-radius: 2px;
            transition: width 0.3s;
            width: 0%;
        }

        /* Main content area */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f5f7fa;
        }

        /* Top nav bar */
        #topnav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: #fff;
            border-bottom: 1px solid #e2e5ea;
            min-height: 48px;
        }
        #topnav .left { display: flex; align-items: center; gap: 8px; }
        #topnav .center { font-size: 13px; color: #6b7280; }
        #topnav .right { display: flex; align-items: center; gap: 8px; }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border: 1px solid #d1d5db;
            background: #fff;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            color: #374151;
            transition: background 0.15s;
        }
        .nav-btn:hover:not(:disabled) { background: #f3f4f6; }
        .nav-btn:disabled { opacity: 0.4; cursor: default; }
        .nav-btn.primary {
            background: #1a56db;
            color: #fff;
            border-color: #1a56db;
        }
        .nav-btn.primary:hover:not(:disabled) { background: #1648b8; }

        #toggleSidebar {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #6b7280;
            padding: 4px;
        }

        /* Content iframe */
        #contentFrame {
            flex: 1;
            border: none;
            width: 100%;
        }
    </style>
    <script type="text/javascript">

    /*************************************/
    // Content definition
    /*************************************/
    var pageArray = [
        "../module1/lesson1_1.html",
        "../module1/lesson1_2.html",
        "../module1/lesson1_3.html",
        "../module2/lesson2_1.html",
        "../module2/lesson2_2.html",
        "../module2/lesson2_3.html",
        "../module3/lesson3_1.html",
        "../module3/lesson3_2.html",
        "../assessment/quiz.html"
    ];

    var pageTitles = [
        "Migration Drivers and Business Case",
        "GCP-to-AWS Service Mapping",
        "Application Portfolio Analysis",
        "Infrastructure-as-Code Conversion",
        "Data Migration Strategies",
        "Application Cutover and Validation",
        "Cost Optimization and FinOps",
        "Performance and Security Optimization",
        "Final Assessment"
    ];

    var moduleNames = [
        "Module 1: Strategic Assessment",
        "Module 1: Strategic Assessment",
        "Module 1: Strategic Assessment",
        "Module 2: Technical Execution",
        "Module 2: Technical Execution",
        "Module 2: Technical Execution",
        "Module 3: Optimization",
        "Module 3: Optimization",
        "Assessment"
    ];

    // Map page index to module index for TOC grouping
    var moduleGroups = [
        { name: "Module 1: Strategic Assessment & Service Mapping", start: 0, end: 2 },
        { name: "Module 2: Technical Migration Execution", start: 3, end: 5 },
        { name: "Module 3: Optimization & Operational Excellence", start: 6, end: 7 },
        { name: "Final Assessment", start: 8, end: 8 }
    ];

    /*************************************/
    // State
    /*************************************/
    var currentPage = 0;
    var startTimeStamp = null;
    var processedUnload = false;
    var reachedEnd = false;
    var visitedPages = {};

    /*************************************/
    // Startup
    /*************************************/
    function doStart() {
        startTimeStamp = new Date();
        ScormProcessInitialize();

        var completionStatus = ScormProcessGetValue("cmi.core.lesson_status");
        if (completionStatus == "not attempted") {
            ScormProcessSetValue("cmi.core.lesson_status", "incomplete");
            ScormProcessCommit();
        }

        var bookmark = ScormProcessGetValue("cmi.core.lesson_location");
        if (bookmark == "") {
            currentPage = 0;
        } else {
            if (confirm("Would you like to resume from where you previously left off?")) {
                currentPage = parseInt(bookmark, 10);
            } else {
                currentPage = 0;
            }
        }

        // Restore visited pages from suspend_data
        var suspendData = ScormProcessGetValue("cmi.suspend_data");
        if (suspendData && suspendData !== "") {
            try {
                var parsed = JSON.parse(suspendData);
                if (parsed.visited) { visitedPages = parsed.visited; }
            } catch(e) {}
        }

        buildTOC();
        goToPage();
    }

    /*************************************/
    // Navigation
    /*************************************/
    function goToPage() {
        var theIframe = document.getElementById("contentFrame");
        var prevButton = document.getElementById("butPrevious");
        var nextButton = document.getElementById("butNext");

        theIframe.src = pageArray[currentPage];
        visitedPages[currentPage] = true;

        prevButton.disabled = (currentPage == 0);
        if (currentPage == pageArray.length - 1) {
            nextButton.disabled = true;
        } else {
            nextButton.disabled = false;
        }

        ScormProcessSetValue("cmi.core.lesson_location", currentPage.toString());

        // Save visited pages
        var suspendData = JSON.stringify({ visited: visitedPages });
        ScormProcessSetValue("cmi.suspend_data", suspendData);
        ScormProcessCommit();

        if (currentPage == pageArray.length - 1) {
            reachedEnd = true;
            // Don't set completed yet — quiz will handle pass/fail
        }

        updateUI();
    }

    function doPrevious() {
        if (currentPage > 0) { currentPage--; }
        goToPage();
    }

    function doNext() {
        if (currentPage < pageArray.length - 1) { currentPage++; }
        goToPage();
    }

    function goToIndex(index) {
        if (index >= 0 && index < pageArray.length) {
            currentPage = index;
            goToPage();
        }
    }

    function doExit() {
        if (reachedEnd == false && confirm("Would you like to save your progress to resume later?")) {
            ScormProcessSetValue("cmi.core.exit", "suspend");
        } else {
            ScormProcessSetValue("cmi.core.exit", "");
        }
        ScormProcessCommit();
        doUnload(true);
    }

    /*************************************/
    // Unload
    /*************************************/
    function doUnload(pressedExit) {
        if (processedUnload == true) { return; }
        processedUnload = true;

        var endTimeStamp = new Date();
        var totalMilliseconds = (endTimeStamp.getTime() - startTimeStamp.getTime());
        var scormTime = ConvertMilliSecondsToSCORMTime(totalMilliseconds, false);
        ScormProcessSetValue("cmi.core.session_time", scormTime);

        if (pressedExit == false && reachedEnd == false) {
            ScormProcessSetValue("cmi.core.exit", "suspend");
        }

        ScormProcessCommit();
        ScormProcessFinish();
    }

    /*************************************/
    // Quiz score reporting — called from assessment/quiz.html
    /*************************************/
    function RecordTest(score) {
        ScormProcessSetValue("cmi.core.score.raw", score.toString());
        ScormProcessSetValue("cmi.core.score.min", "0");
        ScormProcessSetValue("cmi.core.score.max", "100");

        if (score >= 70) {
            ScormProcessSetValue("cmi.core.lesson_status", "passed");
        } else {
            ScormProcessSetValue("cmi.core.lesson_status", "failed");
        }
        ScormProcessCommit();
    }

    /*************************************/
    // Time formatting (SCORM 1.2: HHHH:MM:SS.SS)
    /*************************************/
    function ConvertMilliSecondsToSCORMTime(intTotalMilliseconds, blnIncludeFraction) {
        if (blnIncludeFraction == null || blnIncludeFraction == undefined) {
            blnIncludeFraction = true;
        }
        var intMilliseconds = intTotalMilliseconds % 1000;
        var intSeconds = ((intTotalMilliseconds - intMilliseconds) / 1000) % 60;
        var intMinutes = ((intTotalMilliseconds - intMilliseconds - (intSeconds * 1000)) / 60000) % 60;
        var intHours = (intTotalMilliseconds - intMilliseconds - (intSeconds * 1000) - (intMinutes * 60000)) / 3600000;

        if (intHours == 10000) {
            intHours = 9999;
            intMinutes = (intTotalMilliseconds - (intHours * 3600000)) / 60000;
            if (intMinutes == 100) { intMinutes = 99; }
            intMinutes = Math.floor(intMinutes);
            intSeconds = (intTotalMilliseconds - (intHours * 3600000) - (intMinutes * 60000)) / 1000;
            if (intSeconds == 100) { intSeconds = 99; }
            intSeconds = Math.floor(intSeconds);
            intMilliseconds = (intTotalMilliseconds - (intHours * 3600000) - (intMinutes * 60000) - (intSeconds * 1000));
        }

        var intHundredths = Math.floor(intMilliseconds / 10);
        var strCMITimeSpan = ZeroPad(intHours, 4) + ":" + ZeroPad(intMinutes, 2) + ":" + ZeroPad(intSeconds, 2);

        if (blnIncludeFraction) {
            strCMITimeSpan += "." + intHundredths;
        }

        if (intHours > 9999) {
            strCMITimeSpan = "9999:99:99";
            if (blnIncludeFraction) { strCMITimeSpan += ".99"; }
        }

        return strCMITimeSpan;
    }

    function ZeroPad(intNum, intNumDigits) {
        var strTemp = new String(intNum);
        var intLen = strTemp.length;
        if (intLen > intNumDigits) {
            strTemp = strTemp.substr(0, intNumDigits);
        } else {
            for (var i = intLen; i < intNumDigits; i++) {
                strTemp = "0" + strTemp;
            }
        }
        return strTemp;
    }

    /*************************************/
    // UI
    /*************************************/
    function buildTOC() {
        var toc = document.getElementById("toc");
        var html = "";
        for (var g = 0; g < moduleGroups.length; g++) {
            var group = moduleGroups[g];
            html += '<div class="toc-module">' + group.name + '</div>';
            for (var i = group.start; i <= group.end; i++) {
                html += '<div class="toc-item" id="toc-' + i + '" onclick="goToIndex(' + i + ')">';
                html += '<span class="toc-check" id="toc-check-' + i + '">&#9675;</span>';
                html += '<span class="toc-label">' + pageTitles[i] + '</span>';
                html += '</div>';
            }
        }
        toc.innerHTML = html;
    }

    function updateUI() {
        // Update TOC active/completed states
        for (var i = 0; i < pageArray.length; i++) {
            var item = document.getElementById("toc-" + i);
            var check = document.getElementById("toc-check-" + i);
            if (item) {
                item.className = "toc-item" + (i == currentPage ? " active" : "") + (visitedPages[i] ? " completed" : "");
                if (check) {
                    check.innerHTML = visitedPages[i] ? "&#10003;" : "&#9675;";
                }
            }
        }

        // Update progress bar
        var visitedCount = 0;
        for (var key in visitedPages) { if (visitedPages.hasOwnProperty(key)) visitedCount++; }
        var pct = Math.round((visitedCount / pageArray.length) * 100);
        document.getElementById("progress-fill").style.width = pct + "%";
        document.getElementById("progress-pct").textContent = pct + "% Complete";
        document.getElementById("progress-count").textContent = visitedCount + " / " + pageArray.length;

        // Update top nav
        document.getElementById("pageIndicator").textContent = (currentPage + 1) + " of " + pageArray.length + " — " + pageTitles[currentPage];
    }

    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("collapsed");
    }

    </script>
</head>
<body onload="doStart();" onbeforeunload="doUnload(false);" onunload="doUnload(false);">

<div id="app">
    <!-- Sidebar TOC -->
    <div id="sidebar">
        <div id="sidebar-header">
            <h2>GCP to AWS Migration</h2>
            <p>Multi-Cloud Migration Strategy</p>
        </div>
        <div id="toc"></div>
        <div id="progress-bar">
            <div class="label">
                <span id="progress-pct">0% Complete</span>
                <span id="progress-count">0 / 9</span>
            </div>
            <div id="progress-track"><div id="progress-fill"></div></div>
        </div>
    </div>

    <!-- Main content -->
    <div id="main">
        <div id="topnav">
            <div class="left">
                <button id="toggleSidebar" onclick="toggleSidebar();" title="Toggle sidebar">&#9776;</button>
                <button class="nav-btn" id="butPrevious" onclick="doPrevious();">&#8592; Previous</button>
            </div>
            <div class="center" id="pageIndicator"></div>
            <div class="right">
                <button class="nav-btn primary" id="butNext" onclick="doNext();">Next &#8594;</button>
                <button class="nav-btn" id="butExit" onclick="doExit();">Exit</button>
            </div>
        </div>
        <iframe id="contentFrame" src=""></iframe>
    </div>
</div>

</body>
</html>
